name: Build & Release APK

on:
  push:
    tags:
      - 'v*'          # Dispara quando você criar uma tag tipo v1.0.0
  workflow_dispatch:  # Permite rodar manualmente pelo GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache do Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Permissão para gradlew
        run: chmod +x gradlew

      - name: Decodificar Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore

      - name: Build APK Release (assinado)
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/app/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Renomear APK
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/SorteioMaster-${VERSION}.apk

      - name: Criar Release no GitHub
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "Sorteio Master ${{ github.ref_name }}"
          body: |
            ## 🎉 Sorteio Master ${{ github.ref_name }}

            ### Como instalar
            1. Baixe o arquivo `.apk` abaixo
            2. No Android: **Configurações → Segurança → Fontes desconhecidas** (habilitar)
            3. Abra o APK baixado e instale

            ### Requisitos
            - Android 8.0 ou superior
          files: app/build/outputs/apk/release/SorteioMaster-*.apk
          draft: false
          prerelease: false
